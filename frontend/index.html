<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Recourse — contest automated decisions with a meaningful explanation, structured evidence, and a statutory path to human review." />
    <title>Recourse · Your decision portal</title>
    <script>
      // Avoid flash-of-wrong-theme: apply the saved preference before paint.
      (function () {
        try {
          var stored = localStorage.getItem("recourse-theme");
          var theme = stored === "light" || stored === "dark"
            ? stored
            : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          if (theme === "dark") document.documentElement.classList.add("dark");
          document.documentElement.setAttribute("data-theme", theme);

          // Restore accessibility preferences before paint too.
          var a11y = JSON.parse(localStorage.getItem("recourse-a11y") || "{}");
          Object.keys(a11y).forEach(function (k) {
            if (a11y[k]) document.documentElement.classList.add(k);
          });
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
